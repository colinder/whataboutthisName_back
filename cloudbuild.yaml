steps:
  # 1. Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/whataboutthisname-back:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/whataboutthisname-back:latest'
      - '.'
  
  # 2. Container Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/whataboutthisname-back:$COMMIT_SHA'
  
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/whataboutthisname-back:latest'
  
  # 3. Cloud Run에 자동 배포
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'whataboutthisname-back'
      - '--image=gcr.io/$PROJECT_ID/whataboutthisname-back:$COMMIT_SHA'
      - '--region=asia-northeast3'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/whataboutthisname-back:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/whataboutthisname-back:latest'

# 로깅 옵션 추가 (여기가 핵심!)
options:
  logging: CLOUD_LOGGING_ONLY