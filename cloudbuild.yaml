steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/whataboutthisname-back:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/whataboutthisname-back:latest'
      - '.'
    timeout: '1200s'  # 20분
  
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/whataboutthisname-back:$COMMIT_SHA'
  
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/whataboutthisname-back:latest'
  
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'whataboutthisname-back'
      - '--image=gcr.io/$PROJECT_ID/whataboutthisname-back:$COMMIT_SHA'
      - '--region=asia-northeast3'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--timeout=300'  # 5분 타임아웃
    timeout: '600s'  # 10분

images:
  - 'gcr.io/$PROJECT_ID/whataboutthisname-back:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/whataboutthisname-back:latest'

options:
  logging: CLOUD_LOGGING_ONLY
timeout: '1800s'  # 전체 30분